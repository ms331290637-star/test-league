<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TEST LEAGUE — Exclusive Private Circuit</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syncopate:wght@700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; background: #020204; color: #f8fafc; min-height: 100vh; }
    body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .font-brand   { font-family: 'Syncopate', sans-serif; }
    .font-display { font-family: 'Oswald', sans-serif; }

    /* ── MOBILE SCROLLBAR HIDING ── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── CINEMATIC MOTION BACKGROUND ── */
    .bg-shell {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: -2; overflow: hidden; background: #020204;
    }
    .bg-slide {
      position: absolute; top: -15%; left: -15%; width: 130%; height: 130%;
      background-size: cover; background-position: center;
      opacity: 0;
      filter: brightness(18%) contrast(135%) saturate(60%) blur(1.5px);
      transition: opacity 2.8s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    .bg-slide.on { opacity: 0.55; }
    .bg-slide.on.s0 { animation: panA 25s infinite alternate ease-in-out; }
    .bg-slide.on.s1 { animation: panB 25s infinite alternate ease-in-out; }
    .bg-slide.on.s2 { animation: panC 25s infinite alternate ease-in-out; }
    @keyframes panA { 0%{transform:scale(1.0) translate(0,0)} 100%{transform:scale(1.18) translate(-3%,-2%)} }
    @keyframes panB { 0%{transform:scale(1.15) translate(2%,2%)} 100%{transform:scale(1.0) translate(-2%,-2%)} }
    @keyframes panC { 0%{transform:scale(1.06) translate(-2%,2%)} 100%{transform:scale(1.2) translate(2%,-3%)} }

    .orb { position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none; }
    .orb-gold { width:60vw; height:60vw; background:#eab308; top:-10%; right:5%; opacity:.16; animation:og 34s infinite alternate ease-in-out; }
    .orb-cyan { width:70vw; height:70vw; background:#06b6d4; bottom:-10%; left:-10%; opacity:.10; animation:oc 27s infinite alternate ease-in-out; }
    @keyframes og { to{transform:translate(5%,-5%) scale(1.2)} }
    @keyframes oc { to{transform:translate(-4%,4%) scale(0.9)} }

    @media (min-width: 768px) {
      .orb { filter: blur(130px); }
      .orb-gold { width:46vw; height:46vw; right:8%; top:-8%; }
      .orb-cyan { width:52vw; height:52vw; left:-6%; bottom:-10%; }
    }

    /* ── HERO SPECIFIC ANIMATIONS ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .animate-float { animation: float 6s ease-in-out infinite; }

    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-slow-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    .animate-spin-slow { animation: spin-slow 20s linear infinite; }
    .animate-spin-slow-reverse { animation: spin-slow-reverse 25s linear infinite; }

    /* ── GLASS CARD ── */
    .glass {
      background: rgba(4,6,14,0.52);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.055);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.04), 0 20px 50px rgba(0,0,0,0.55);
    }

    /* ── NAV TAB ── */
    .ntab { position: relative; transition: color .35s ease; }
    .ntab::after {
      content:''; position:absolute; bottom:0; left:50%; width:0; height:2px;
      background:linear-gradient(90deg,#06b6d4,#eab308);
      transition:all .35s cubic-bezier(.4,0,.2,1); transform:translateX(-50%);
      border-radius:99px; opacity:0;
    }
    .ntab.on { color:#fff; font-weight:600; }
    .ntab.on::after { width:1.8rem; opacity:1; box-shadow:0 0 10px #06b6d4; }

    /* ── LOGO PULSE ── */
    .logo-pulse { animation: lp 3.2s ease-in-out infinite; }
    @keyframes lp {
      0%,100% { box-shadow:0 0 14px rgba(234,179,8,.15); border-color:rgba(234,179,8,.3); }
      50%      { box-shadow:0 0 24px rgba(6,182,212,.45); border-color:rgba(6,182,212,.55); }
    }

    /* ── CARD HOVER ── */
    .lift {
      transition: transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s ease, border-color .35s ease;
    }
    @media (hover: hover) {
      .lift:hover {
        transform: translateY(-6px) scale(1.01);
        border-color: rgba(6,182,212,.2) !important;
        box-shadow: 0 28px 56px rgba(0,0,0,.75), 0 0 36px rgba(6,182,212,.06);
      }
    }

    /* ── AUCTION ANIMATIONS ── */
    @keyframes bidFlash {
      0%   { box-shadow:0 0 0 0 rgba(6,182,212,0);      background:transparent; }
      35%  { box-shadow:0 0 35px 8px rgba(6,182,212,.5); background:rgba(6,182,212,.08); }
      70%  { box-shadow:0 0 18px 2px rgba(6,182,212,.2);  background:rgba(6,182,212,.03); }
      100% { box-shadow:0 0 0 0 rgba(6,182,212,0);      background:transparent; }
    }
    .bid-flash { animation:bidFlash .75s ease-out forwards; }

    @keyframes soldIn {
      0%   { transform:rotate(-15deg) scale(.1); opacity:0; }
      65%  { transform:rotate(-15deg) scale(1.12); opacity:1; }
      100% { transform:rotate(-15deg) scale(1); opacity:1; }
    }
    .sold-in { animation:soldIn .55s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* ── MISC ── */
    .fade-up { opacity:0; transform:translateY(26px); animation:fu .75s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes fu { to{opacity:1;transform:translateY(0)} }

    .blink { animation:bl 1.6s ease-in-out infinite; }
    @keyframes bl { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.35);opacity:.25} }

    ::-webkit-scrollbar { width:4px; height: 4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#2d3748; border-radius:99px; }

    /* ── PRINT ── */
    @media print {
      body > * { display:none !important; }
      #ps { display:block !important; background:#fff !important; color:#000 !important; padding:20px; font-family:Arial,sans-serif; }
      .ph { text-align:center; border-bottom:3px solid #000; padding-bottom:18px; margin-bottom:28px; }
      .ph h1 { font-size:20px; font-weight:900; letter-spacing:2px; margin:0 0 4px; }
      .ph p  { font-size:12px; color:#555; margin:0; }
      .pts   { margin-bottom:32px; page-break-inside:avoid; }
      .ptitle{ font-size:15px; font-weight:bold; border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:6px; }
      .ppurse{ font-size:11px; color:#555; margin-bottom:8px; }
      .ptab  { width:100%; border-collapse:collapse; }
      .ptab th,.ptab td { border:1px solid #ddd; padding:6px 8px; text-align:left; font-size:11px; }
      .ptab th { background:#f0f0f0; font-weight:bold; }
      .pfoot { text-align:center; margin-top:28px; font-size:10px; color:#888; }
    }
  </style>
</head>

/* ════════════════════════════════════════
   MOTION BACKGROUND
════════════════════════════════════════ */
function MotionBg() {
  const [slide, setSlide] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setSlide(s => (s + 1) % BG.length), 8000);
    return () => clearInterval(id);
  }, []);
  return (
    <div className="bg-shell">
      {BG.map((img, i) => (
        <div key={i} className={`bg-slide s${i} ${i === slide ? 'on' : ''}`}
             style={{ backgroundImage:`url(${img})` }} />
      ))}
      <div className="orb orb-gold" />
      <div className="orb orb-cyan" />
    </div>
  );
}

/* ════════════════════════════════════════
   AUCTION — ADMIN CONTROL PANEL
════════════════════════════════════════ */
function AuctionView({ as, setAs }) {
  const [subTab,   setSubTab]   = useState('block');
  const [curBid,   setCurBid]   = useState(null);
  const [isSold,   setIsSold]   = useState(false);
  const [isPassed, setIsPassed] = useState(false);
  const [winnerId, setWinnerId] = useState(null);
  const [modal,    setModal]    = useState(false);
  const bidRef = useRef(null);

  const { queue, unsold, ledger, soldMap, unsoldRound } = as;

  const pid    = queue[0];
  const player = PLAYERS.find(p => p.id === pid);
  const base   = player ? player.base : 0;
  const liveBid = curBid ?? base;

  const flash = useCallback(() => {
    const el = bidRef.current;
    if (!el) return;
    el.classList.remove('bid-flash');
    void el.offsetWidth;
    el.classList.add('bid-flash');
  }, []);

  const handleBid = () => {
    if (isSold || isPassed || !player) return;
    setCurBid(v => (v ?? base) + incr(v ?? base));
    flash();
  };

  const handleHammer = (tid) => {
    const team = ledger[tid];
    if (team.purseBalance < liveBid) { alert('Insufficient purse balance for this franchise.'); return; }
    const winTeam = TEAMS.find(t => t.id === tid);
    setWinnerId(tid);
    setIsSold(true);
    setModal(false);
    const newLedger = { ...ledger };
    newLedger[tid] = { purseBalance: team.purseBalance - liveBid, playersAcquired: [...team.playersAcquired, { ...player, finalPrice: liveBid }] };
    setAs({ ...as, ledger: newLedger, soldMap: { ...soldMap, [player.id]: { price: liveBid, franchise: winTeam.name, status:'SOLD' } } });
  };

  const handlePass = () => {
    if (isSold || isPassed || !player) return;
    setIsPassed(true);
    const newUnsold = unsoldRound ? unsold : [...unsold, player.id];
    setAs({ ...as, unsold: newUnsold, soldMap: { ...soldMap, [player.id]: { price:0, franchise:'N/A', status:'UNSOLD' } } });
  };

  const handleNext = () => {
    const remaining = queue.slice(1);
    let updates = {};
    if (remaining.length === 0 && unsold.length > 0 && !unsoldRound) {
      updates = { queue: [...unsold], unsold: [], unsoldRound: true };
    } else {
      updates = { queue: remaining };
    }
    setAs(prev => ({ ...prev, ...updates }));
    setCurBid(null); setIsSold(false); setIsPassed(false); setWinnerId(null);
  };

  const handlePrint = () => {
    const el = document.getElementById('ps');
    const date = new Date().toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' });
    let html = `<div class="ph"><h1>TEST LEAGUE</h1><p>Official Auction Allocation Summary — ${date}</p></div>`;
    TEAMS.forEach(t => {
      const d = ledger[t.id];
      const rows = d.playersAcquired.map(p => `<tr><td><b>${p.name}</b></td><td>${p.role}</td><td>${fmt(p.finalPrice)}</td></tr>`).join('')
        || `<tr><td colspan="3" style="color:#999;font-style:italic">No assets acquired.</td></tr>`;
      html += `<div class="pts"><div class="ptitle">${t.name}</div><div class="ppurse">Purse Remaining: ${fmt(d.purseBalance)} &nbsp;|&nbsp; Players Acquired: ${d.playersAcquired.length}</div><table class="ptab"><thead><tr><th>Player</th><th>Role</th><th>Hammer Price</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    });
    html += `<div class="pfoot">Generated by TEST LEAGUE Control System — ${date}</div>`;
    el.innerHTML = html;
    el.style.display = 'block';
    const cleanup = () => { el.style.display='none'; window.removeEventListener('afterprint', cleanup); };
    window.addEventListener('afterprint', cleanup);
    window.print();
  };

  const soldCount = Object.values(soldMap).filter(x => x.status === 'SOLD').length;
  const auctionDone = queue.length === 0;

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 py-10 fade-up">
      {/* Sub-header */}
      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 sm:gap-4 mb-6 sm:mb-8 pb-4 sm:pb-5"
           style={{ borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <div className="flex items-center gap-2 sm:gap-3 w-full sm:w-auto overflow-x-auto no-scrollbar pb-1 sm:pb-0">
          <span className="blink inline-block w-1.5 h-1.5 sm:w-2 sm:h-2 bg-cyan-400 rounded-full flex-shrink-0" />
          <span className="font-brand text-cyan-400 text-[9px] sm:text-[10px] tracking-widest whitespace-nowrap">LIVE AUCTION</span>
          {unsoldRound && (
            <span className="text-[8px] sm:text-[9px] font-bold px-2 py-1 rounded-full bg-orange-500/15 text-orange-400 border border-orange-500/25 tracking-wider whitespace-nowrap">
              UNSOLD POOL ROUND
            </span>
          )}
        </div>
        <div className="flex gap-4 sm:gap-5 items-center w-full sm:w-auto justify-between sm:justify-end">
          <div className="flex gap-4 sm:gap-5">
            {[['block','Control Panel'],['franchise','Franchise Ledgers']].map(([id,label]) => (
              <button key={id} onClick={() => setSubTab(id)}
                className={`font-brand text-[9px] sm:text-[10px] uppercase tracking-widest pb-1 border-b-2 transition-colors whitespace-nowrap ${subTab===id ? 'text-cyan-400 border-cyan-400' : 'text-gray-500 border-transparent hover:text-gray-300'}`}>
                {label}
              </button>
            ))}
          </div>
          <div className="text-[10px] sm:text-xs text-gray-600 pl-3 sm:pl-4 whitespace-nowrap" style={{ borderLeft:'1px solid rgba(255,255,255,0.07)' }}>
            {soldCount} / {PLAYERS.length}
          </div>
        </div>
      </div>

      {/* ── CONTROL PANEL ── */}
      {subTab === 'block' && (
        auctionDone ? (
          <div className="max-w-md mx-auto text-center py-16 sm:py-20 px-4">
            <div className="text-5xl sm:text-6xl mb-4 sm:mb-6">🎊</div>
            <h2 className="font-brand text-sm sm:text-base text-white mb-2 sm:mb-3 tracking-widest">AUCTION CONCLUDED</h2>
            <p className="text-gray-500 text-xs sm:text-sm mb-6 sm:mb-8">All athletes have been allocated to their respective franchises.</p>
            <button onClick={handlePrint}
                    className="w-full sm:w-auto px-6 sm:px-8 py-3.5 rounded-xl font-brand text-[10px] sm:text-xs text-black tracking-wider transition-all hover:scale-105 active:scale-95"
                    style={{ background:'linear-gradient(135deg,#06b6d4,#eab308)', boxShadow:'0 8px 24px rgba(6,182,212,0.35)' }}>
              DOWNLOAD OFFICIAL MANIFEST
            </button>
          </div>
        ) : !player ? null : (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8 items-start">

            {/* Player Feature Card */}
            <div className="lg:col-span-2 glass rounded-2xl sm:rounded-3xl overflow-hidden border border-white/5">
              <div className={`relative h-64 sm:h-80 bg-gradient-to-b ${player.grad} flex items-center justify-center`}>
                <div className="absolute inset-0 opacity-10"
                     style={{ backgroundImage:'radial-gradient(circle at 2px 2px,white 1px,transparent 0)', backgroundSize:'20px 20px' }} />
                <img src={player.photo} alt={player.name}
                     className="w-32 h-32 sm:w-44 sm:h-44 rounded-full object-cover z-10"
                     style={{ border:'4px solid rgba(255,255,255,0.1)', boxShadow:'0 16px 48px rgba(0,0,0,.6)' }} />
                <div className="absolute top-3 left-3 sm:top-4 sm:left-4 rounded-xl px-3 sm:px-4 py-1.5 sm:py-2 z-10"
                     style={{ background:'rgba(0,0,0,.65)', backdropFilter:'blur(8px)' }}>
                  <div className="font-brand text-[7px] sm:text-[8px] text-gray-400 tracking-widest leading-none mb-0.5 sm:mb-1">BASE VALUATION</div>
                  <div className="font-display font-bold text-base sm:text-lg text-yellow-400">{fmt(player.base)}</div>
                </div>
                {unsoldRound && (
                  <div className="absolute top-3 right-3 sm:top-4 sm:right-4 bg-orange-500/20 text-orange-400 font-brand text-[7px] sm:text-[8px] px-2.5 sm:px-3 py-1 rounded-full border border-orange-500/30 z-10 tracking-widest">
                    UNSOLD POOL
                  </div>
                )}
                {/* Overlay: SOLD or PASSED */}
                {(isSold || isPassed) && (
                  <div className="absolute inset-0 flex items-center justify-center z-20"
                       style={{ background:'rgba(0,0,0,.78)', backdropFilter:'blur(4px)' }}>
                    {isSold ? (
                      <div className="sold-in flex flex-col items-center gap-1 sm:gap-1.5">
                        <div className="font-brand text-red-500 px-4 sm:px-5 py-1.5 sm:py-2 rounded-xl text-5xl sm:text-[4rem] leading-none"
                             style={{ letterSpacing:'0.1em',
                                      border:'4px solid rgba(239,68,68,.85)',
                                      filter:'drop-shadow(0 0 24px rgba(239,68,68,.7))' }}>
                          SOLD
                        </div>
                        <div className="font-brand text-[8px] sm:text-[10px] text-red-400 tracking-widest mt-1 sm:mt-0">
                          {TEAMS.find(t=>t.id===winnerId)?.name}
                        </div>
                        <div className="font-display font-bold text-red-300 text-lg sm:text-xl">{fmt(liveBid)}</div>
                      </div>
                    ) : (
                      <div className="flex flex-col items-center gap-1.5 sm:gap-2">
                        <div className="font-brand text-gray-400 px-4 sm:px-6 py-1.5 sm:py-2 rounded-xl text-2xl sm:text-3xl"
                             style={{ border:'3px solid rgba(156,163,175,.5)', letterSpacing:'0.12em' }}>
                          PASSED
                        </div>
                        <div className="font-brand text-[7px] sm:text-[9px] text-gray-500 tracking-widest">Returns to Unsold Pool</div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="p-5 sm:p-8">
                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-4">
                  <div>
                    <h2 className="text-2xl sm:text-3xl font-bold text-white mb-1 sm:mb-2">{player.name}</h2>
                    <span className={`inline-block text-[10px] sm:text-xs font-bold px-2.5 py-1 rounded-full border ${ROLE_BADGE[player.role]||''}`}>
                      {player.role}
                    </span>
                  </div>
                  <div className="flex gap-4 sm:gap-6 text-center w-full sm:w-auto justify-between sm:justify-start bg-black/20 sm:bg-transparent p-3 sm:p-0 rounded-xl">
                    {[['Matches',player.stats.m],['High Score',player.stats.hs],['Strike Rate',player.stats.sr]].map(([l,v])=>(
                      <div key={l}>
                        <div className="font-display font-bold text-lg sm:text-xl text-yellow-400">{v}</div>
                        <div className="font-brand text-[7px] sm:text-[8px] text-gray-600 tracking-widest mt-0.5">{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <p className="text-gray-400 text-xs sm:text-sm font-light leading-relaxed">{player.bio}</p>
              </div>
            </div>

            {/* Bidding Panel */}
            <div className="flex flex-col gap-3 sm:gap-4">
              {/* Live Bid display */}
              <div ref={bidRef} className="glass rounded-2xl p-5 sm:p-6 text-center"
                   style={{ borderTop:'2px solid rgba(6,182,212,.35)' }}>
                <div className="font-brand text-[7px] sm:text-[8px] text-gray-500 tracking-widest block mb-2 sm:mb-3">CURRENT MAXIMUM BID</div>
                <div className="font-display font-black text-4xl sm:text-5xl tracking-tight break-all" style={{ color:'#22d3ee', lineHeight:1 }}>
                  {fmt(liveBid)}
                </div>
                <div className="font-brand text-[7px] sm:text-[8px] text-gray-700 mt-2 sm:mt-2.5 tracking-wider">
                  +{fmt(incr(liveBid))} PER RAISE
                </div>
              </div>

              {/* COMMAND RAISE */}
              <button onClick={handleBid} disabled={isSold || isPassed}
                      className="w-full py-3.5 sm:py-4 rounded-xl font-brand text-[10px] sm:text-[11px] text-black tracking-widest transition-all hover:brightness-110 active:scale-[0.97] disabled:opacity-20 disabled:cursor-not-allowed"
                      style={{ background:'linear-gradient(135deg,#06b6d4,#0284c7)', boxShadow:'0 8px 24px rgba(6,182,212,.3)' }}>
                ⬆ COMMAND RAISE
              </button>

              {/* HAMMER / PASS */}
              <div className="grid grid-cols-2 gap-2 sm:gap-3">
                <button onClick={() => setModal(true)} disabled={isSold || isPassed}
                        className="py-3 sm:py-3.5 rounded-xl font-brand text-[9px] sm:text-[10px] tracking-widest border border-green-500/30 text-green-400 hover:bg-green-500/10 transition-all disabled:opacity-20 disabled:cursor-not-allowed">
                  🔨 HAMMER
                </button>
                <button onClick={handlePass} disabled={isSold || isPassed}
                        className="py-3 sm:py-3.5 rounded-xl font-brand text-[9px] sm:text-[10px] tracking-widest border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-all disabled:opacity-20 disabled:cursor-not-allowed">
                  PASS
                </button>
              </div>

              {/* ADVANCE */}
              {(isSold || isPassed) && (
                <button onClick={handleNext}
                        className="w-full py-3 sm:py-3.5 rounded-xl font-brand text-[9px] sm:text-[10px] text-white tracking-widest transition-all active:scale-95 mt-1"
                        style={{ background:'rgba(255,255,255,.05)', border:'1px solid rgba(255,255,255,.09)' }}>
                  ADVANCE SEQUENCE ⏭
                </button>
              )}

              {/* Drafted list mobile accordion/stack */}
              {soldCount > 0 && (
                <div className="glass rounded-xl sm:rounded-2xl overflow-hidden border border-white/5 mt-2 sm:mt-0">
                  <div className="px-3 sm:px-4 py-2 sm:py-2.5 flex items-center justify-between"
                       style={{ borderBottom:'1px solid rgba(255,255,255,.06)' }}>
                    <span className="font-brand text-[7px] sm:text-[8px] text-gray-400 tracking-widest">ALLOCATED</span>
                    <span className="text-[9px] sm:text-[10px] text-gray-600 bg-white/5 px-2 py-0.5 rounded-full">{soldCount}</span>
                  </div>
                  <div className="max-h-40 sm:max-h-52 overflow-y-auto custom-scrollbar">
                    {PLAYERS.filter(p => soldMap[p.id]?.status==='SOLD').reverse().map(p => (
                      <div key={p.id} className="px-3 sm:px-4 py-2 sm:py-2.5 flex items-center justify-between"
                           style={{ borderBottom:'1px solid rgba(255,255,255,.03)' }}>
                        <div className="min-w-0 pr-2">
                          <div className="text-[10px] sm:text-xs font-medium text-white truncate">{p.name}</div>
                          <div className="text-[8px] sm:text-[10px] text-gray-600 truncate">{soldMap[p.id].franchise}</div>
                        </div>
                        <div className="text-[9px] sm:text-[10px] font-mono font-bold text-cyan-400 flex-shrink-0">{fmt(soldMap[p.id].price)}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* PDF button (Hidden on very small screens to save space, but kept for sm) */}
              <button onClick={handlePrint}
                      className="hidden sm:block w-full py-3 rounded-xl text-xs text-gray-500 hover:text-gray-300 transition-all"
                      style={{ background:'rgba(255,255,255,.03)', border:'1px solid rgba(255,255,255,.06)' }}>
                📥 Download Team Roster (PDF)
              </button>
            </div>
          </div>
        )
      )}

      {/* ── FRANCHISE LEDGERS ── */}
      {subTab === 'franchise' && (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 sm:gap-6">
          {TEAMS.map(t => {
            const d = ledger[t.id];
            const spent = INITIAL_PURSE - d.purseBalance;
            const pct   = ((spent / INITIAL_PURSE) * 100).toFixed(0);
            return (
              <div key={t.id} className="glass rounded-2xl overflow-hidden border border-white/5">
                <div className="p-4 sm:p-5 flex items-center gap-3 sm:gap-4"
                     style={{ borderBottom:'1px solid rgba(255,255,255,.06)', background:`linear-gradient(90deg,${t.primary}35,transparent)` }}>
                  <Crest short={t.short} sz={38} />
                  <div className="min-w-0 flex-1">
                    <h4 className="font-bold text-white text-xs sm:text-sm leading-tight truncate">{t.name}</h4>
                    <div className="text-[10px] sm:text-xs font-mono mt-0.5" style={{ color:t.accent }}>{fmt(d.purseBalance)} left</div>
                    <div className="text-[9px] sm:text-[10px] text-gray-600 mt-0.5">{d.playersAcquired.length} players · {fmt(spent)} spent</div>
                  </div>
                </div>

                <div className="px-4 sm:px-5 py-2.5 sm:py-3" style={{ borderBottom:'1px solid rgba(255,255,255,.05)' }}>
                  <div className="flex justify-between font-brand text-[7px] sm:text-[8px] text-gray-600 tracking-wider mb-1.5">
                    <span>PURSE UTILISED</span><span>{pct}%</span>
                  </div>
                  <div className="h-1 sm:h-1.5 rounded-full overflow-hidden bg-white/5">
                    <div className="h-full rounded-full transition-all duration-700"
                         style={{ width:`${pct}%`, background:`linear-gradient(90deg,${t.primary},${t.accent})` }} />
                  </div>
                </div>

                <div className="p-3 sm:p-4 max-h-56 sm:max-h-64 overflow-y-auto custom-scrollbar">
                  {d.playersAcquired.length > 0 ? (
                    <div className="space-y-1.5 sm:space-y-2">
                      {d.playersAcquired.map((p,i) => (
                        <div key={i} className="flex items-center justify-between bg-white/5 rounded-lg px-2.5 sm:px-3 py-1.5 sm:py-2">
                          <div className="min-w-0 pr-2">
                            <div className="text-[10px] sm:text-xs font-medium text-white truncate">{p.name}</div>
                            <div className="text-[8px] sm:text-[10px] text-gray-500 truncate">{p.role}</div>
                          </div>
                          <div className="text-[9px] sm:text-xs font-mono font-bold text-yellow-400 flex-shrink-0">{fmt(p.finalPrice)}</div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="text-[10px] sm:text-xs text-gray-600 py-3 sm:py-4 text-center">No assets acquired yet.</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TEAM SELECTION MODAL ── */}
      {modal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{ background:'rgba(0,0,0,.88)', backdropFilter:'blur(14px)' }}>
          <div className="glass max-w-sm w-full rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
            <div className="p-5 sm:p-6" style={{ borderBottom:'1px solid rgba(255,255,255,.07)' }}>
              <h3 className="font-brand text-[10px] sm:text-[11px] text-white tracking-widest text-center">ASSIGN ACQUISITION</h3>
              <p className="text-center font-brand text-[8px] sm:text-[9px] text-gray-500 mt-1.5 tracking-wider">
                Hammer at: <span className="text-cyan-400 font-mono font-bold">{fmt(liveBid)}</span>
              </p>
            </div>
            <div className="p-3 sm:p-4 space-y-2">
              {TEAMS.map(t => {
                const d = ledger[t.id];
                const insufficient = d.purseBalance < liveBid;
                return (
                  <button key={t.id} onClick={() => !insufficient && handleHammer(t.id)}
                          disabled={insufficient}
                          className="w-full py-2.5 sm:py-3 text-xs sm:text-sm font-medium rounded-xl px-3 sm:px-4 flex items-center justify-between transition-all hover:border-cyan-500/40 disabled:opacity-30 disabled:cursor-not-allowed border"
                          style={{ background:'rgba(255,255,255,.04)', borderColor:'rgba(255,255,255,.07)' }}>
                    <div className="flex items-center gap-2 sm:gap-3">
                      <Crest short={t.short} sz={24} />
                      <span className="text-white text-xs sm:text-sm">{t.name}</span>
                    </div>
                    <div className="text-right">
                      <div className="font-mono text-[10px] sm:text-xs" style={{ color:insufficient?'#ef4444':t.accent }}>
                        {fmt(d.purseBalance)}
                      </div>
                      {insufficient && <div className="font-brand text-[7px] sm:text-[8px] text-red-500 tracking-wider">INSUFFICIENT</div>}
                    </div>
                  </button>
                );
              })}
            </div>
            <div className="px-5 sm:px-6 pb-4 sm:pb-5 pt-1">
              <button onClick={() => setModal(false)}
                      className="w-full text-center text-[10px] sm:text-xs text-gray-600 hover:text-gray-400 transition-colors py-2">
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   APP
════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('home');
  const [as, setAs] = useState(() => {
    const ledger = {};
    TEAMS.forEach(t => { ledger[t.id] = { purseBalance: INITIAL_PURSE, playersAcquired: [] }; });
    return { queue: PLAYERS.map(p=>p.id), unsold:[], ledger, soldMap:{}, unsoldRound:false };
  });

  return (
    <>
      <MotionBg />
      <div style={{ position:'relative', zIndex:1, minHeight:'100vh', display:'flex', flexDirection:'column' }}>
        <Nav tab={tab} setTab={setTab} />
        <main className="flex-1 pb-10 sm:pb-16">
          {tab==='home'      && <HeroView setTab={setTab} />}
          {tab==='about'     && <AboutView />}
          {tab==='players'   && <PlayersView />}
          {tab==='teams'     && <TeamsView />}
          {tab==='champions' && <ChampionsView />}
          {tab==='auction'   && <AuctionView as={as} setAs={setAs} />}
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
